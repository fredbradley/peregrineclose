<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peregrine Close</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      background: #f8f6f2;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .card {
      max-width: 480px;
      width: 100%;
    }

    .icon {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: 2.2rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
      color: #1a1a1a;
    }

    .tagline {
      font-family: 'Lora', serif;
      font-style: italic;
      color: #7a7468;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #555;
      margin-bottom: 2rem;
    }

    .contact {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #2c2c2c;
      color: #f8f6f2;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }

    .contact:hover {
      background: #444;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.72rem;
      color: #bbb;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🏡</div>
    <h1>Peregrine Close</h1>
    <p class="tagline">Details coming soon</p>
    
    <a class="contact" href="mailto:hello@peregrinclose.co.uk">Get in touch</a>
    <footer>
      <p>&copy; 2026 Peregrine Close</p>
    </footer>
  </div>
</body>
</html>
